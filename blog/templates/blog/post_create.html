{% extends "pages/base.html" %}
{% block title %}New Post{% endblock %}

{% block content %}
<h1>New Post</h1>
<form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div>
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
            {% for error in field.errors %}<p>{{ error }}</p>{% endfor %}
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit">Publish</button>
</form>
{% endblock %}
